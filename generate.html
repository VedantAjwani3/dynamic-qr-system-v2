<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TRL QR Generator</title>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>

body{

margin:0;

padding:30px;

font-family:Arial,Helvetica,sans-serif;

background:#eef2f7;

}

.container{

max-width:520px;

margin:auto;

background:#ffffff;

padding:25px;

border-radius:12px;

box-shadow:0 0 15px rgba(0,0,0,.15);

text-align:center;

}

h2{

margin-top:0;

color:#003366;

}

.subtitle{

color:#666;

margin-bottom:20px;

}

input{

width:90%;

padding:12px;

font-size:18px;

border:1px solid #bbb;

border-radius:6px;

margin-bottom:15px;

}

button{

padding:12px 20px;

font-size:16px;

background:#003366;

color:white;

border:none;

border-radius:6px;

cursor:pointer;

margin:5px;

}

button:hover{

background:#0055aa;

}

#qrArea{

margin-top:20px;

display:flex;

justify-content:center;

}

#empName{

font-size:24px;

font-weight:bold;

margin-top:15px;

color:#003366;

}

#empCompany{

font-size:18px;

margin-top:5px;

color:#555;

}

#empID{

font-size:16px;

margin-top:5px;

color:#444;

}

</style>

</head>

<body>

<div class="container">

<h2>TRL QR Generator</h2>

<div class="subtitle">

Generate Employee QR Code

</div>

<input

type="text"

id="empid"

placeholder="Enter Employee ID">

<br>

<button onclick="generateQR()">

Generate QR

</button>

<button onclick="downloadQR()">

Download QR

</button>

<div id="qrArea"></div>

<div id="empName"></div>

<div id="empCompany"></div>

<div id="empID"></div>

</div>

<script>

const sheetURL="https://script.google.com/macros/s/AKfycbz7i_0eSB34jsXN-r8aQurwulksa30ODpaEsM1LDESV4hbon8xEVLkSfVILZtQnTQ1fbA/exec";

let qrCode=null;

let currentPerson=null;
    async function generateQR(){

const id=document.getElementById("empid").value.trim();

if(id===""){

alert("Please enter Employee ID");

return;

}

document.getElementById("qrArea").innerHTML="";

document.getElementById("empName").innerHTML="Loading...";

document.getElementById("empCompany").innerHTML="";

document.getElementById("empID").innerHTML="";

try{

const response=await fetch(sheetURL);

const data=await response.json();

const person=data.find(r=>String(r.ID).trim().toUpperCase()===id.toUpperCase());

if(!person){

alert("Employee not found");

document.getElementById("empName").innerHTML="";

return;

}

currentPerson=person;

document.getElementById("empName").innerHTML=person.Name;

document.getElementById("empCompany").innerHTML=person["Company Name"] || "";

document.getElementById("empID").innerHTML=person.ID;

        const qrLink =
"https://dynamic-qr-system-v2.vercel.app/profile.html?id=" +
encodeURIComponent(person.ID);

qrCode = new QRCodeStyling({

width:280,

height:280,

type:"canvas",

data:qrLink,

margin:10,

imageOptions:{

hideBackgroundDots:true,

imageSize:0.4,

margin:0

},

dotsOptions:{

color:"#000000",

type:"rounded"

},

backgroundOptions:{

color:"#ffffff"

},

cornersSquareOptions:{

color:"#003366",

type:"extra-rounded"

},

cornersDotOptions:{

color:"#003366"

}

});

qrCode.append(document.getElementById("qrArea"));

}

catch(error){

console.error(error);

alert("Unable to load employee details.");

}

}

    async function downloadQR(){

    if(!currentPerson){

        alert("Generate QR first.");

        return;

    }

    const qrCanvas=document.querySelector("#qrArea canvas");

    if(!qrCanvas){

        alert("QR image not found.");

        return;

    }

    const finalCanvas=document.createElement("canvas");

    finalCanvas.width=400;

    finalCanvas.height=500;

    const ctx=finalCanvas.getContext("2d");

    // Background
    ctx.fillStyle="#FFFFFF";
    ctx.fillRect(0,0,400,500);

    // QR
    ctx.drawImage(qrCanvas,60,20,280,280);

    // Name
    ctx.textAlign="center";
    ctx.fillStyle="#003366";
    ctx.font="bold 24px Arial";
    ctx.fillText(currentPerson.Name,200,345);

    // Company
    ctx.fillStyle="#666666";
    ctx.font="18px Arial";
    ctx.fillText(currentPerson["Company Name"] || "",200,375);

    // ID
    ctx.fillStyle="#000000";
    ctx.font="bold 18px Arial";
    ctx.fillText(currentPerson.ID,200,405);

    // Download
    const link=document.createElement("a");

    link.download=currentPerson.ID+".png";

    link.href=finalCanvas.toDataURL("image/png");

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

}

</script>

</body>

</html>
