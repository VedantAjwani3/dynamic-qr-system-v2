<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>TRL QR Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{

font-family:Arial,Helvetica,sans-serif;

background:#f2f2f2;

padding:30px;

}

.box{

background:white;

max-width:520px;

margin:auto;

padding:25px;

border-radius:10px;

box-shadow:0 0 12px rgba(0,0,0,.2);

text-align:center;

}

.logo{

width:130px;

margin-bottom:15px;

}

input{

width:90%;

padding:12px;

font-size:18px;

margin-top:15px;

border-radius:6px;

border:1px solid #ccc;

}

button{

padding:12px 22px;

margin-top:15px;

font-size:17px;

background:#003366;

color:white;

border:none;

border-radius:6px;

cursor:pointer;

margin-left:5px;

margin-right:5px;

}

button:hover{

background:#0055aa;

}

#qrcode{

margin-top:25px;

}

#empName{

margin-top:15px;

font-size:22px;

font-weight:bold;

color:#003366;

}

#empCompany{

font-size:17px;

color:#666;

margin-top:6px;

}

</style>

</head>

<body>

<div class="box">

<img src="trl-logo.jpg" class="logo">

<h2>TRL QR Generator</h2>

<input

type="text"

id="empid"

placeholder="Enter Employee ID">

<br>

<button onclick="generateQR()">

Generate QR

</button>

<button onclick="downloadQR()">

Download QR

</button>

<div id="qrcode"></div>

<div id="empName"></div>

<div id="empCompany"></div>

</div>

<script>

const sheetURL="https://script.google.com/macros/s/AKfycbz7i_0eSB34jsXN-r8aQurwulksa30ODpaEsM1LDESV4hbon8xEVLkSfVILZtQnTQ1fbA/exec";

let currentPerson=null;

function generateQR(){

let id=document.getElementById("empid").value.trim();

if(id==""){

alert("Enter Employee ID");

return;

}

fetch(sheetURL)

.then(res=>res.json())

.then(data=>{

const person=data.find(r=>r.ID===id);

if(!person){

alert("Employee not found");

return;

}

currentPerson=person;

document.getElementById("qrcode").innerHTML="";

document.getElementById("empName").innerHTML="";

document.getElementById("empCompany").innerHTML="";

let url="https://dynamic-qr-system-v2.vercel.app/profile.html?id="+encodeURIComponent(id);

new QRCode(document.getElementById("qrcode"),{

text:url,

width:250,

height:250

});

setTimeout(function(){

document.getElementById("empName").innerHTML=person.Name || "";

document.getElementById("empCompany").innerHTML=person["Company Name"] || "";

},300);

})

.catch(function(){

alert("Unable to connect to Google Sheet.");

});

}



function downloadQR(){

if(currentPerson==null){

alert("Generate QR first.");

return;

}

const qrCanvas=document.querySelector("#qrcode canvas");

if(!qrCanvas){

alert("QR not generated.");

return;

}

const canvas=document.createElement("canvas");

canvas.width=450;

canvas.height=620;

const ctx=canvas.getContext("2d");



ctx.fillStyle="white";

ctx.fillRect(0,0,450,620);



const logo=new Image();

logo.src="trl-logo.jpg";

logo.onload=function(){



ctx.drawImage(logo,125,20,200,70);



ctx.fillStyle="#003366";

ctx.font="bold 24px Arial";

ctx.textAlign="center";

ctx.fillText("TRL Contractor QR",225,120);



ctx.drawImage(qrCanvas,100,150,250,250);



ctx.fillStyle="#000";

ctx.font="bold 24px Arial";

ctx.fillText(currentPerson.Name,225,435);



ctx.font="18px Arial";

ctx.fillStyle="#555";

ctx.fillText(currentPerson["Company Name"] || "",225,465);



ctx.fillStyle="#003366";

ctx.font="bold 20px Arial";

ctx.fillText(currentPerson.ID,225,500);



const link=document.createElement("a");

link.download=currentPerson.ID+".png";

link.href=canvas.toDataURL("image/png");

link.click();

};

}

</script>

</body>

</html>
