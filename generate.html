<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>TRL QR Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{

font-family:Arial,Helvetica,sans-serif;

background:#f2f2f2;

margin:0;

padding:25px;

}

.box{

max-width:520px;

margin:auto;

background:#fff;

padding:25px;

border-radius:10px;

box-shadow:0 0 12px rgba(0,0,0,.20);

text-align:center;

}

.logo{

width:140px;

margin-bottom:15px;

}

h2{

margin-top:0;

color:#003366;

}

input{

width:90%;

padding:12px;

font-size:18px;

margin-top:15px;

border:1px solid #ccc;

border-radius:6px;

}

button{

margin-top:18px;

padding:12px 25px;

font-size:17px;

background:#003366;

color:white;

border:none;

border-radius:6px;

cursor:pointer;

}

button:hover{

background:#0055aa;

}

#qrcode{

margin-top:25px;

}

#empName{

margin-top:15px;

font-size:22px;

font-weight:bold;

color:#003366;

}

#empCompany{

font-size:17px;

color:#555;

margin-top:5px;

}

</style>

</head>

<body>

<div class="box">

<img src="trl-logo.jpg" class="logo">

<h2>TRL QR Generator</h2>

<input
type="text"
id="empid"
placeholder="Enter Employee ID">

<br>

<button onclick="generateQR()">

Generate QR

</button>

<div id="qrcode"></div>

<br>

<button onclick="downloadQR()">

Download QR

</button>

<div id="empName"></div>

<div id="empCompany"></div>

</div>

<script>

const sheetURL="https://script.google.com/macros/s/AKfycbz7i_0eSB34jsXN-r8aQurwulksa30ODpaEsM1LDESV4hbon8xEVLkSfVILZtQnTQ1fbA/exec";

function generateQR(){

let id=document.getElementById("empid").value.trim();

if(id==""){

alert("Enter Employee ID");

return;

}

fetch(sheetURL)

.then(res=>res.json())

.then(data=>{

const person=data.find(r=>r.ID===id);

if(!person){

alert("Employee ID not found");

return;

}

document.getElementById("qrcode").innerHTML="";

document.getElementById("empName").innerHTML="";

document.getElementById("empCompany").innerHTML="";

let url=
"https://dynamic-qr-system-v2.vercel.app/profile.html?id="+encodeURIComponent(id);

new QRCode(
document.getElementById("qrcode"),
{

text:url,

width:260,

height:260
}
);

setTimeout(function(){

document.getElementById("empName").innerHTML=person.Name || "";

document.getElementById("empCompany").innerHTML=person["Company Name"] || "";

},300);

})

.catch(function(){

alert("Unable to load data from Google Sheet.");

});

}

function downloadQR(){

    const img=document.querySelector("#qrcode img");

    const canvas=document.querySelector("#qrcode canvas");

    let source="";

    if(img){

        source=img.src;

    }else if(canvas){

        source=canvas.toDataURL("image/png");

    }else{

        alert("Generate QR first.");

        return;

    }

    const a=document.createElement("a");

    a.href=source;

    a.download=document.getElementById("empid").value.trim()+".png";

    a.click();

}

</script>

</body>

</html>
