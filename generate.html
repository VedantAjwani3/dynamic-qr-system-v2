<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRL QR Generator</title>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>

body{

margin:0;

padding:30px;

font-family:Arial,Helvetica,sans-serif;

background:#eef2f7;

}

.container{

max-width:520px;

margin:auto;

background:#fff;

padding:25px;

border-radius:12px;

box-shadow:0 0 15px rgba(0,0,0,.15);

text-align:center;

}

h2{

margin:0;

color:#003366;

}

.subtitle{

margin-top:6px;

margin-bottom:20px;

color:#666;

}

input{

width:90%;

padding:12px;

font-size:18px;

border-radius:6px;

border:1px solid #bbb;

margin-bottom:15px;

}

button{

padding:12px 20px;

font-size:16px;

border:none;

border-radius:6px;

cursor:pointer;

margin:5px;

background:#003366;

color:white;

}

button:hover{

background:#0055aa;

}

#qrArea{

margin-top:25px;

}

#empName{

font-size:24px;

font-weight:bold;

color:#003366;

margin-top:15px;

}

#empCompany{

font-size:17px;

color:#555;

margin-top:5px;

}

</style>

</head>

<body>

<div class="container">

<h2>TRL QR Generator</h2>

<div class="subtitle">

Employee QR Generator

</div>

<input
type="text"
id="empid"
placeholder="Enter Employee ID (Example: TRL-001)">

<br>

<button onclick="generateQR()">

Generate QR

</button>

<button onclick="downloadQR()">

Download QR

</button>

<div id="qrArea"></div>

<div id="empName"></div>

<div id="empCompany"></div>

</div>

<script>

const sheetURL="https://script.google.com/macros/s/AKfycbz7i_0eSB34jsXN-r8aQurwulksa30ODpaEsM1LDESV4hbon8xEVLkSfVILZtQnTQ1fbA/exec";

let qrCode;

let currentPerson=null;

async function generateQR(){

const id=document.getElementById("empid").value.trim();

if(id===""){

alert("Please enter Employee ID");

return;

}

document.getElementById("qrArea").innerHTML="";

document.getElementById("empName").innerHTML="Loading...";

document.getElementById("empCompany").innerHTML="";

try{

const response=await fetch(sheetURL);

const data=await response.json();

const person=data.find(r=>String(r.ID).trim().toUpperCase()===id.toUpperCase());

if(!person){

alert("Employee not found");

document.getElementById("empName").innerHTML="";

return;

}

currentPerson=person;

document.getElementById("empName").innerHTML=person.Name;

document.getElementById("empCompany").innerHTML=person["Company Name"] || "";

const qrLink="https://dynamic-qr-system-v2.vercel.app/profile.html?id="+encodeURIComponent(person.ID);

qrCode=new QRCodeStyling({

width:280,

height:280,

type:"canvas",

data:qrLink,

margin:5,

dotsOptions:{

color:"#000000",

type:"rounded"

},

backgroundOptions:{

color:"#ffffff"

},

cornersSquareOptions:{

color:"#003366",

type:"extra-rounded"

},

cornersDotOptions:{

color:"#003366"

}

});

qrCode.append(document.getElementById("qrArea"));

}

catch(err){

console.error(err);

alert("Unable to connect to Google Sheet.");

}

}

async function downloadQR(){

    if(!qrCode){

        alert("Generate QR first.");

        return;

    }

    if(!currentPerson){

        alert("Generate QR first.");

        return;

    }

    await qrCode.download({

        name: currentPerson.ID + "-" + currentPerson.Name,

        extension: "png"

    });

}

</script>

</body>

</html>
