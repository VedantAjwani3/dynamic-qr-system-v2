<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.box{

background:white;
max-width:450px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);

}

input{

width:90%;
padding:12px;
font-size:18px;
margin-top:15px;

}

button{

margin-top:15px;
padding:12px 20px;
font-size:18px;
background:#003366;
color:white;
border:none;
cursor:pointer;
border-radius:5px;

}

#qrcode{

margin-top:25px;

}

</style>

</head>

<body>

<div class="box">

<h2>TRL QR Generator</h2>

<input
id="empid"
placeholder="Enter Employee ID">

<br>

<button onclick="generateQR()">

Generate QR

</button>

<div id="qrcode"></div>

</div>

<script>

function generateQR(){

let id=document.getElementById("empid").value.trim();

if(id==""){

alert("Enter Employee ID");

return;

}

document.getElementById("qrcode").innerHTML="";

let url="https://dynamic-qr-system-v2.vercel.app/profile.html?id="+encodeURIComponent(id);

new QRCode(document.getElementById("qrcode"),{

text:url,
width:250,
height:250

});

}

</script>

</body>
</html>
